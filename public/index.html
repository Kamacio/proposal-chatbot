<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEO - Newborn Academy</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #f7f3ec;
      color: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .chat-container {
      width: 100%; max-width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: #f7f3ec; overflow: hidden;
    }

    .header {
      padding: 10px 20px 14px;
      background: #f7f3ec;
      border-bottom: 1px solid rgba(20,20,20,0.10);
      display: flex; align-items: flex-start; gap: 14px;
      flex-shrink: 0;
    }

    .header h1 {
      margin: 0; padding: 0;
      font-size: 24px; line-height: 0.95;
    }

    .header p {
      margin: 4px 0 0 !important; padding: 0;
      opacity: 0.7; font-size: 13px; line-height: 1;
    }

    .header > div:last-child {
      display: flex; flex-direction: column;
      gap: 0; justify-content: center; padding-top: 2px;
    }

    .neo-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background-image: url('/neo-avatar.png');
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
      font-size: 0;
      box-shadow: 0 0 0 2px rgba(107,143,113,0.15), 0 0 35px rgba(107,143,113,0.45);
    }

    .neo-avatar.small {
      width: 32px; height: 32px;
    }

    .bot-row {
      display: flex; align-items: flex-start;
      gap: 10px; margin-bottom: 12px;
    }

    #chat {
      flex: 1; min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #f7f3ec;
      padding: 20px;
    }

    .message {
      padding: 14px 17px;
      border-radius: 18px;
      margin-bottom: 6px;
      max-width: 82%;
      line-height: 1.45;
      animation: fadeInUp 0.25s ease;
      word-wrap: break-word;
      font-size: 14px; font-weight: 400;
    }

    .user {
      background: #111; color: #fff;
      margin-left: auto;
      border-bottom-right-radius: 6px;
    }

    .bot {
      background: #ffffff; color: #111;
      border: 1px solid rgba(20,20,20,0.08);
      border-bottom-left-radius: 6px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.05);
    }

    .time {
      display: block; font-size: 11px;
      opacity: 0.55; margin-top: 6px; text-align: right;
    }

    .typing-dots {
      display: inline-flex; gap: 4px; align-items: center;
    }

    .typing-dots span {
      width: 6px; height: 6px;
      background: #111; border-radius: 50%;
      opacity: 0.35;
      animation: typingPulse 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingPulse {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Fade-in parola per parola */
    .word {
      display: inline;
      opacity: 0;
      animation: wordFade 0.25s ease forwards;
    }

    @keyframes wordFade {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .input-row {
      display: flex; gap: 10px;
      padding: 15px 15px calc(15px + env(safe-area-inset-bottom));
      background: #f7f3ec;
      border-top: 1px solid rgba(20,20,20,0.10);
      flex-shrink: 0;
    }

    #messageInput {
      flex: 1;
      padding: 0 16px; height: 50px;
      border-radius: 999px;
      border: 1px solid rgba(20,20,20,0.12);
      background: #ffffff; color: #111;
      font-family: inherit; font-size: 16px;
      min-width: 0; outline: none;
    }

    #messageInput:focus {
      border-color: rgba(20,20,20,0.24);
    }

    #messageInput::placeholder {
      color: rgba(20,20,20,0.45);
    }

    #sendBtn {
      height: 50px; min-width: 78px;
      padding: 0 22px; border: none;
      border-radius: 999px;
      background: #111; color: #fff;
      font-family: inherit; font-size: 13px;
      font-weight: 700; letter-spacing: -0.01em;
      flex-shrink: 0; cursor: pointer;
    }

    .lead-form {
      background: #f0ece4;
      border: 1px solid rgba(20,20,20,0.10);
      border-radius: 16px;
      padding: 14px;
      margin-top: 4px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .lead-form input {
      width: 100%; box-sizing: border-box;
      border-radius: 10px;
      padding: 11px 13px;
      background: #ffffff; color: #111;
      border: 1px solid rgba(20,20,20,0.15);
      font-size: 14px; font-family: inherit;
      outline: none;
    }

    .lead-form input:focus {
      border-color: rgba(20,20,20,0.30);
    }

    .lead-form button {
      width: 100%; padding: 13px 18px;
      border: none; border-radius: 10px;
      background: #111; color: #fff;
      font-family: inherit; font-size: 13px;
      font-weight: 700; cursor: pointer;
    }

    .lead-confirm {
      font-size: 13px; line-height: 1.55; color: #333;
    }

    @supports (-webkit-touch-callout: none) {
      html, body { height: -webkit-fill-available; }
      .chat-container { height: -webkit-fill-available; }
    }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="header">
    <div class="neo-avatar"></div>
    <div>
      <h1>NEO</h1>
      <p>Chatta con me</p>
    </div>
  </div>

  <div id="chat"></div>

  <div class="input-row">
    <input type="text" id="messageInput" placeholder="Scrivi un messaggio..." maxlength="1000" />
    <button id="sendBtn" type="button">Invia</button>
  </div>
</div>

<script>
  const conversation = [];
  let notifyTimeout = null;
  let leadFormSent = false;

  const chat = document.getElementById('chat');
  const messageInput = document.getElementById('messageInput');

  function scrollBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function nowTime() {
    return new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHTML(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function appendUserMessage(text) {
    const div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = `${escapeHTML(text)}<span class="time">${nowTime()}</span>`;
    chat.appendChild(div);
    scrollBottom();
  }

  function createBotRow() {
    const row = document.createElement('div');
    row.className = 'bot-row';
    const avatar = document.createElement('div');
    avatar.className = 'neo-avatar small';
    row.appendChild(avatar);
    return row;
  }

  function appendBotMessageAnimated(html, onComplete) {
    const row = createBotRow();
    const bubble = document.createElement('div');
    bubble.className = 'message bot';
    row.appendChild(bubble);
    chat.appendChild(row);
    scrollBottom();

    const DELAY = 60;
    const lines = html.split(/<br\s*\/?>/i);
    let wordIndex = 0;

    lines.forEach((line, lineIdx) => {
      const words = line.split(' ').filter(w => w.length > 0);
      words.forEach((word) => {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = word + ' ';
        span.style.animationDelay = `${wordIndex * DELAY}ms`;
        bubble.appendChild(span);
        wordIndex++;
      });
      if (lineIdx < lines.length - 1) {
        bubble.appendChild(document.createElement('br'));
      }
    });

    const totalDuration = wordIndex * DELAY + 250;
    setTimeout(() => {
      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = nowTime();
      bubble.appendChild(time);
      scrollBottom();
      if (onComplete) onComplete();
    }, totalDuration);

    const scrollInterval = setInterval(() => scrollBottom(), 100);
    setTimeout(() => clearInterval(scrollInterval), totalDuration + 300);

    return bubble;
  }

  function appendTyping() {
    const row = createBotRow();
    const bubble = document.createElement('div');
    bubble.className = 'message bot';
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    row.appendChild(bubble);
    chat.appendChild(row);
    scrollBottom();
    return row;
  }

  /* ─── Lead intent — solo intenzione esplicita di contatto ── */
  const LEAD_KEYWORDS = [
    'contattarvi', 'contattarci', 'contattatemi',
    'parlarvi', 'parlarci', 'parlare con voi',
    'vorrei essere contattato', 'mandate', 'mandatemi',
    'chiamatemi', 'scrivetemi', 'lascio i miei dati',
    'lascio il numero', 'lascio la mail',
    'come vi contatto', 'come posso contattarvi'
  ];

  function hasLeadIntent(text) {
    const t = text.toLowerCase();
    return LEAD_KEYWORDS.some(w => t.includes(w));
  }

  function detectInterest(text) {
    const t = text.toLowerCase();
    if (t.includes('newborn') || t.includes('neonato')) return 'newborn';
    if (t.includes('maternity') || t.includes('gravidanza')) return 'maternity';
    if (t.includes('business') || t.includes('marketing')) return 'business';
    if (t.includes('workshop')) return 'workshop';
    if (t.includes('prezzo') || t.includes('costa')) return 'prezzo';
    return 'generico';
  }

  function extractContact(text) {
    const emailMatch = text.match(/[A-Z0-9._%+\-]+@[A-Z0-9.\-]+\.[A-Z]{2,}/i);
    const phoneMatch = text.match(/(?:^|[\s,;])(\+?[\d][\d\s\-]{7,14}\d)(?=\s|$|[,;])/);
    const nameMatch  = text.match(/(?:mi chiamo|sono)\s+([A-Za-zÀ-ÿ]+)/i);
    return {
      email: emailMatch ? emailMatch[0] : null,
      phone: phoneMatch ? phoneMatch[1].replace(/[\s\-]/g, '') : null,
      name:  nameMatch  ? nameMatch[1] : null,
    };
  }

  function scheduleNotify(extra = {}) {
    clearTimeout(notifyTimeout);
    notifyTimeout = setTimeout(() => {
      const formatted = conversation
        .map(m => `${m.role === 'assistant' ? 'NEO' : 'UTENTE'}: ${m.content}`)
        .join('\n\n');
      fetch('https://hook.eu2.make.com/pyj6jphurgnpkklyadxx44y486sx9b15', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          conversation: formatted,
          page: window.location.href,
          timestamp: new Date().toISOString(),
          ...extra
        })
      }).catch(() => {});
    }, 60000);
  }

  function appendLeadForm() {
    const row = createBotRow();
    const bubble = document.createElement('div');
    bubble.className = 'message bot';

    const form = document.createElement('div');
    form.className = 'lead-form';

    const nameInput  = document.createElement('input');
    nameInput.type = 'text'; nameInput.placeholder = 'Il tuo nome'; nameInput.maxLength = 80;

    const emailInput = document.createElement('input');
    emailInput.type = 'email'; emailInput.placeholder = 'La tua email'; emailInput.maxLength = 120;

    const phoneInput = document.createElement('input');
    phoneInput.type = 'tel'; phoneInput.placeholder = 'Telefono'; phoneInput.maxLength = 20;

    const btn = document.createElement('button');
    btn.type = 'button'; btn.textContent = 'Invia';

    function handleEnter(e) {
      if (e.key === 'Enter') { e.preventDefault(); btn.click(); }
    }
    nameInput.addEventListener('keydown', handleEnter);
    emailInput.addEventListener('keydown', handleEnter);
    phoneInput.addEventListener('keydown', handleEnter);

    btn.addEventListener('click', () => {
      if (leadFormSent) return;
      leadFormSent = true;

      const name  = nameInput.value.trim();
      const email = emailInput.value.trim();
      const phone = phoneInput.value.trim();

      const leadText = `Nome: ${name || '-'}\nEmail: ${email || '-'}\nTelefono: ${phone || '-'}`;
      conversation.push({ role: 'user', content: leadText });

      const formatted = conversation
        .map(m => `${m.role === 'assistant' ? 'NEO' : 'UTENTE'}: ${m.content}`)
        .join('\n\n');

      fetch('https://hook.eu2.make.com/pyj6jphurgnpkklyadxx44y486sx9b15', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name, email, phone,
          conversation: formatted,
          interest: detectInterest(formatted),
          page: window.location.href,
          timestamp: new Date().toISOString(),
          lead_form: true
        })
      }).catch(() => {});

      while (form.firstChild) form.removeChild(form.firstChild);
      const confirm = document.createElement('div');
      confirm.className = 'lead-confirm';
      confirm.innerHTML = `<strong>Dati inviati ✓</strong><br>
        Nome: ${escapeHTML(name || '-')}<br>
        Email: ${escapeHTML(email || '-')}<br>
        Telefono: ${escapeHTML(phone || '-')}<br><br>
        Perfetto, grazie. Abbiamo ricevuto i tuoi dati e ti ricontatteremo con le informazioni più adatte al tuo caso.<br>
        Nel frattempo puoi continuare a farmi domande qui in chat.`;
      form.appendChild(confirm);

      conversation.push({ role: 'assistant', content: 'Grazie, abbiamo ricevuto i tuoi dati e ti ricontatteremo presto.' });
      scrollBottom();
    });

    form.appendChild(nameInput);
    form.appendChild(emailInput);
    form.appendChild(phoneInput);
    form.appendChild(btn);

    bubble.appendChild(form);
    row.appendChild(bubble);
    chat.appendChild(row);
    scrollBottom();
  }

  /* ─── Messaggio di benvenuto ─────────────────────────── */
  const WELCOME = 'Qualcosa non è chiaro?\nChiedi, mi hanno spiegato tutto 😊';

  window.addEventListener('load', () => {
    setTimeout(() => {
      const typingRow = appendTyping();
      setTimeout(() => {
        typingRow.remove();
        appendBotMessageAnimated(escapeHTML(WELCOME).replace(/\n/g, '<br>'));
        conversation.push({ role: 'assistant', content: WELCOME });
      }, 1800);
    }, 1000);
  });

  /* ─── Invio messaggio ────────────────────────────────── */
  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    messageInput.value = '';

    const contact = extractContact(text);
    conversation.push({ role: 'user', content: text });
    appendUserMessage(text);
    scheduleNotify(contact);

    const typingRow = appendTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversation })
      });

      const data = await response.json();
      typingRow.remove();

      const reply = data.reply || 'Non ho ricevuto una risposta. Riprova.';
      conversation.push({ role: 'assistant', content: reply });

      appendBotMessageAnimated(escapeHTML(reply).replace(/\n/g, '<br>'), () => {
        if (hasLeadIntent(text) && !leadFormSent) {
          appendLeadForm();
        }
      });

    } catch (err) {
      typingRow.remove();
      appendBotMessageAnimated('C\'è stato un problema nel ricevere la risposta. Riprova tra qualche secondo.');
    }
  }

  /* ─── Event listeners ────────────────────────────────── */
  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  messageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
